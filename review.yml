  - date: '2026-06-03'
    rating: 2
    summary: >-
      USM has a real but mostly gated API footprint. An institutional API developer
      portal exists at api.usm.my (operated by PPKT), returning HTTP 200, but its
      catalog and docs are behind login with no public endpoints or specifications.
      The one openly verifiable machine-readable interface is the EPrints 3.3.16
      institutional repository at eprints.usm.my, whose OAI-PMH 2.0 endpoint returns
      a valid Identify response (repositoryName "USM Repository", admin
      eprints@usm.my). No official USM GitHub organization was found
      (github.com/usm-my returns 404). No data.usm.my or developer.usm.my subdomain
      resolves. No endpoints were fabricated; only live-verified surfaces are
      cataloged.
    endpoints:
      - url: https://eprints.usm.my/cgi/oai2?verb=Identify
        status: 200
        note: Live OAI-PMH 2.0 Identify response, EPrints 3.3.16, USM Repository.
